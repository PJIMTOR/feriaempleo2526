<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad 3 - Peticiones HTTP</title>

    <link rel="stylesheet" href="css/style2.css">

</head>

<body>
    <a href="index.html" class="home-btn">
        <span>Inicio</span>
        <svg viewBox="0 0 24 24" fill="none">
            <path d="M3 10.5L12 3L21 10.5V21H14V15H10V21H3V10.5Z" stroke="currentColor" stroke-width="1.8"
                stroke-linejoin="round" />
        </svg>
    </a>

    <header>
        <h1>Actividad 4 📤<br><span>Publica tu CV en Internet</span></h1>
        <p>Aprende a crear tu primer CV online con IA y subirlo a la web en minutos.</p>
    </header>

    <section class="cv-section">

        <h2 class="cv-title">CV publicados</h2>
        <p class="cv-subtitle">
            Actualmente hay <span id="cv-count">0</span> CV publicados
        </p>

        <div id="loading" class="loading">Cargando CVs...</div>

        <div id="cv-list" class="cv-grid"></div>

    </section>

    <footer>
        Mi CV - Taller FP DAW © 2026
    </footer>

    <script>
        const list = document.getElementById("cv-list");
        const countSpan = document.getElementById("cv-count");
        const loading = document.getElementById("loading");

        function formatName(filename) {
            return filename
                .replace(".html", "")
                .replace(/[-_]/g, " ")
                .split(" ")
                .map(word =>
                    word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()
                )
                .join(" ");
        }

        fetch("https://api.github.com/repos/pjimtor/feriaempleo2526/contents/cv")
            .then(response => response.json())
            .then(files => {

                const htmlFiles = files
                    .filter(file => file.name.endsWith(".html"))
                    .sort((a, b) => a.name.localeCompare(b.name));

                loading.style.display = "none";

                if (htmlFiles.length === 0) {
                    list.innerHTML = "<p>No hay CVs publicados todavía.</p>";
                    return;
                }

                countSpan.textContent = htmlFiles.length;

                htmlFiles.forEach(file => {

                    const card = document.createElement("a");
                    card.href = "cv/" + file.name;
                    card.target = "_blank";
                    card.classList.add("cv-card");

                    card.innerHTML = `
                    <div class="cv-icon">📄</div>
                    <h3>${formatName(file.name)}</h3>
                    <span>Ver CV</span>
                `;

                    list.appendChild(card);
                });

            })
            .catch(error => {
                loading.textContent = "Error cargando los CVs.";
                console.error(error);
            });
    </script>
</body>

</html>
