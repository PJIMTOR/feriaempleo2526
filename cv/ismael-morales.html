<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV - Ismael Morales</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}

body{
    background: linear-gradient(135deg,#1f2937,#111827);
    color:#333;
    padding:40px;
}

.cv-container{
    max-width:900px;
    margin:auto;
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.header{
    background: linear-gradient(135deg,#2563eb,#4f46e5);
    color:white;
    padding:40px;
    text-align:center;
}

.header h1{
    font-size:38px;
    margin-bottom:5px;
}

.header p{
    opacity:0.9;
}

.section{
    padding:30px 40px;
    border-bottom:1px solid #eee;
}

.section:last-child{
    border-bottom:none;
}

.section h2{
    margin-bottom:15px;
    color:#2563eb;
    font-size:22px;
}

.list{
    list-style:none;
}

.list li{
    padding:8px 0;
    position:relative;
    padding-left:20px;
}

.list li::before{
    content:"•";
    color:#2563eb;
    position:absolute;
    left:0;
}

.skills span{
    display:inline-block;
    background:#2563eb;
    color:white;
    padding:8px 14px;
    border-radius:20px;
    margin:5px 5px 0 0;
    font-size:14px;
}

.footer{
    text-align:center;
    padding:15px;
    font-size:13px;
    background:#f9fafb;
    color:#666;
}

@media (max-width:600px){
    body{
        padding:15px;
    }

    .header h1{
        font-size:28px;
    }

    .section{
        padding:25px;
    }
}
</style>

</head>
<body>

<div class="cv-container">

<div class="header">
<h1>Ismael Morales</h1>
<p>Perfil personal</p>
</div>

<div class="section">
<h2>🎓 Estudios</h2>
<ul class="list">
<li>Educación Secundaria Obligatoria (ESO)</li>
</ul>
</div>

<div class="section">
<h2>💡 Intereses</h2>
<ul class="list">
<li>Tecnología</li>
<li>Videojuegos</li>
</ul>
</div>

<div class="section">
<h2>⚡ Habilidades</h2>
<div class="skills">
<span>Aprendizaje rápido</span>
</div>
</div>

<div class="footer">
CV de Ismael Morales
</div>

</div>

</body>
</html>
