<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV - Paula Martin</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: "Segoe UI", Arial, sans-serif;
    }

    body{
        background: linear-gradient(135deg,#667eea,#764ba2);
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
        padding:20px;
    }

    .cv{
        background:white;
        max-width:800px;
        width:100%;
        border-radius:12px;
        box-shadow:0 10px 25px rgba(0,0,0,0.2);
        overflow:hidden;
    }

    .header{
        background:#1f2937;
        color:white;
        padding:40px;
        text-align:center;
    }

    .header h1{
        font-size:36px;
        letter-spacing:1px;
    }

    .header p{
        opacity:0.8;
        margin-top:8px;
    }

    .content{
        padding:35px;
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:30px;
    }

    .section{
        margin-bottom:10px;
    }

    .section h2{
        font-size:18px;
        margin-bottom:10px;
        color:#4f46e5;
        border-bottom:2px solid #eee;
        padding-bottom:5px;
    }

    ul{
        list-style:none;
    }

    ul li{
        padding:6px 0;
        color:#333;
    }

    .full{
        grid-column:1 / -1;
    }

    .tag{
        display:inline-block;
        background:#eef2ff;
        color:#4338ca;
        padding:6px 10px;
        border-radius:6px;
        margin:5px 5px 0 0;
        font-size:14px;
    }

    @media(max-width:600px){
        .content{
            grid-template-columns:1fr;
        }
    }
</style>

</head>
<body>

<div class="cv">

    <div class="header">
        <h1>Paula Martin</h1>
        <p>Currículum Vitae</p>
    </div>

    <div class="content">

        <div class="section">
            <h2>Estudios</h2>
            <ul>
                <li>Educación Secundaria Obligatoria (ESO)</li>
            </ul>
        </div>

        <div class="section">
            <h2>Habilidades</h2>
            <ul>
                <li>Trabajo en equipo</li>
                <li>Aprendizaje rápido</li>
            </ul>
        </div>

        <div class="section full">
            <h2>Intereses</h2>
            <span class="tag">Tecnología</span>
            <span class="tag">Videojuegos</span>
        </div>

    </div>

</div>

</body>
</html>
