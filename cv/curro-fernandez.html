<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV - Curro Fernandez Perez</title>
  <style>
    /* Reset básico */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: #f4f7f9;
      color: #333;
      line-height: 1.6;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2.5rem;
      color: #2c3e50;
      margin-bottom: 5px;
    }

    header p {
      color: #7f8c8d;
      font-size: 1.1rem;
    }

    section {
      margin-bottom: 30px;
    }

    section h2 {
      color: #2980b9;
      font-size: 1.5rem;
      border-bottom: 2px solid #2980b9;
      display: inline-block;
      margin-bottom: 15px;
      padding-bottom: 5px;
    }

    ul {
      list-style: none;
    }

    ul li {
      background: #ecf0f1;
      margin-bottom: 10px;
      padding: 10px 15px;
      border-radius: 8px;
      transition: background 0.3s;
    }

    ul li:hover {
      background: #d1ecf1;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 2rem;
      }

      section h2 {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Curro Fernandez Perez</h1>
      <p>Apasionado de la tecnología y los videojuegos</p>
    </header>

    <section>
      <h2>Estudios</h2>
      <ul>
        <li>ESO</li>
        <li>Grado Medio en Mecatrónica</li>
        <li>Grado Superior en Mecatrónica</li>
      </ul>
    </section>

    <section>
      <h2>Habilidades</h2>
      <ul>
        <li>Trabajo en equipo</li>
        <li>Aprendizaje rápido</li>
      </ul>
    </section>

    <section>
      <h2>Intereses</h2>
      <ul>
        <li>Tecnología</li>
        <li>Videojuegos</li>
      </ul>
    </section>
  </div>
</body>
</html>
