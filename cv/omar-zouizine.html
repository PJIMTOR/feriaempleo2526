<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV - Omar Zouizine</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

body{
background: linear-gradient(135deg,#0f172a,#1e293b);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.cv-container{
background:#111827;
padding:40px;
border-radius:15px;
width:800px;
max-width:95%;
box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

.header{
text-align:center;
margin-bottom:30px;
}

.header h1{
font-size:38px;
letter-spacing:2px;
color:#38bdf8;
}

.header p{
color:#9ca3af;
margin-top:8px;
}

.section{
margin-bottom:25px;
}

.section h2{
color:#38bdf8;
margin-bottom:10px;
border-bottom:2px solid #38bdf8;
display:inline-block;
padding-bottom:3px;
}

.list{
margin-top:10px;
padding-left:20px;
}

.list li{
margin-bottom:6px;
color:#d1d5db;
}

.skills{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

.skill{
background:#1e40af;
padding:8px 14px;
border-radius:20px;
font-size:14px;
}

.footer{
text-align:center;
margin-top:20px;
font-size:14px;
color:#9ca3af;
}

@media(max-width:600px){

.header h1{
font-size:28px;
}

.cv-container{
padding:25px;
}

}
</style>
</head>

<body>

<div class="cv-container">

<div class="header">
<h1>Omar Zouizine</h1>
<p>Currículum Vitae</p>
</div>

<div class="section">
<h2>Estudios</h2>
<ul class="list">
<li>Educación Secundaria Obligatoria (ESO)</li>
</ul>
</div>

<div class="section">
<h2>Habilidades</h2>
<div class="skills">
<span class="skill">Idiomas</span>
<span class="skill">Memoria fotográfica</span>
</div>
</div>

<div class="section">
<h2>Intereses</h2>
<ul class="list">
<li>Tecnología</li>
<li>Videojuegos</li>
</ul>
</div>

<div class="footer">
<p>© 2026 Omar Zouizine</p>
</div>

</div>

</body>
</html>
