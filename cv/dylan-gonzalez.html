<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV - Dylan Gonzalez</title>
    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f8;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 12px 25px rgba(0,0,0,0.1);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5em;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            color: #7f8c8d;
        }

        section {
            margin-bottom: 30px;
        }

        section h2 {
            font-size: 1.5em;
            color: #2980b9;
            border-bottom: 2px solid #2980b9;
            padding-bottom: 5px;
            margin-bottom: 15px;
        }

        ul {
            list-style: none;
        }

        li {
            background: #ecf0f1;
            margin-bottom: 10px;
            padding: 10px 15px;
            border-radius: 5px;
        }

        .skills li {
            display: inline-block;
            margin-right: 10px;
            background: #3498db;
            color: #fff;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            header h1 {
                font-size: 2em;
            }

            section h2 {
                font-size: 1.3em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Dylan Gonzalez</h1>
            <p>ESO, SMR, DAW</p>
        </header>

        <section>
            <h2>Intereses</h2>
            <p>Tecnología y videojuegos</p>
        </section>

        <section>
            <h2>Habilidades</h2>
            <ul class="skills">
                <li>Trabajo en equipo</li>
                <li>Aprendizaje rápido</li>
            </ul>
        </section>
    </div>
</body>
</html>
