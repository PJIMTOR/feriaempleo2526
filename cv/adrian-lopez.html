<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV - Adrián López</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Segoe UI", Arial, sans-serif;
}

body{
background: linear-gradient(135deg,#1f2937,#111827);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:#333;
}

.cv-container{
background:white;
width:900px;
max-width:95%;
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
display:grid;
grid-template-columns: 1fr 2fr;
}

.sidebar{
background:#2563eb;
color:white;
padding:40px 25px;
}

.sidebar h1{
font-size:28px;
margin-bottom:10px;
}

.sidebar p{
opacity:0.9;
margin-bottom:25px;
}

.section{
margin-bottom:25px;
}

.section h2{
font-size:18px;
margin-bottom:10px;
border-bottom:2px solid rgba(255,255,255,0.3);
padding-bottom:5px;
}

.section ul{
list-style:none;
}

.section ul li{
margin-bottom:8px;
}

.main{
padding:40px;
background:#f9fafb;
}

.main h2{
font-size:22px;
margin-bottom:15px;
color:#2563eb;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
margin-bottom:20px;
}

.card h3{
margin-bottom:10px;
color:#111827;
}

.card p{
color:#4b5563;
}

.skills{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.skill{
background:#2563eb;
color:white;
padding:6px 12px;
border-radius:20px;
font-size:14px;
}

@media(max-width:700px){
.cv-container{
grid-template-columns:1fr;
}
.sidebar{
text-align:center;
}
}
</style>
</head>

<body>

<div class="cv-container">

<div class="sidebar">
<h1>Adrián López</h1>
<p>Currículum Vitae</p>

<div class="section">
<h2>Intereses</h2>
<ul>
<li>Tecnología</li>
<li>Videojuegos</li>
</ul>
</div>

</div>

<div class="main">

<div class="card">
<h2>Educación</h2>
<h3>Bachillerato</h3>
<p>Educación secundaria completada.</p>
</div>

<div class="card">
<h2>Habilidades</h2>
<div class="skills">
<span class="skill">Trabajo en equipo</span>
<span class="skill">Aprendizaje rápido</span>
</div>
</div>

</div>

</div>

</body>
</html>
