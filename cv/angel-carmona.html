<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV - Angel Carmona</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.cv-container{
    background:white;
    width:800px;
    max-width:90%;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

header{
    text-align:center;
    margin-bottom:30px;
}

header h1{
    font-size:2.5em;
    color:#333;
}

header p{
    color:#777;
}

.section{
    margin-bottom:25px;
}

.section h2{
    font-size:1.4em;
    color:#4facfe;
    margin-bottom:10px;
    border-bottom:2px solid #eee;
    padding-bottom:5px;
}

ul{
    list-style:none;
}

ul li{
    padding:6px 0;
    color:#444;
}

.tag{
    display:inline-block;
    background:#f0f4ff;
    padding:6px 12px;
    border-radius:20px;
    margin:5px 5px 0 0;
    font-size:0.9em;
}

footer{
    text-align:center;
    margin-top:30px;
    font-size:0.9em;
    color:#999;
}

@media (max-width:600px){
    header h1{
        font-size:2em;
    }
}
</style>

</head>

<body>

<div class="cv-container">

<header>
<h1>Angel Carmona</h1>
<p>Currículum Vitae</p>
</header>

<div class="section">
<h2>Estudios</h2>
<ul>
<li>Primaria</li>
</ul>
</div>

<div class="section">
<h2>Intereses</h2>
<div class="tag">Informática</div>
</div>

<div class="section">
<h2>Habilidades</h2>
<ul>
<li>Cagar de pie</li>
</ul>
</div>

<footer>
CV generado en HTML
</footer>

</div>

</body>
</html>
