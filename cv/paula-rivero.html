<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV - Rivero</title>

<style>

body{
    margin:0;
    font-family: "Georgia", serif;
    background: linear-gradient(135deg,#ffe6f0,#fff5f9);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.cv{
    background:white;
    width:700px;
    max-width:90%;
    padding:40px;
    border-radius:20px;
    border:3px solid #ffd6e7;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

header{
    text-align:center;
    margin-bottom:30px;
}

header h1{
    font-size:36px;
    color:#d63384;
    margin-bottom:5px;
}

header p{
    color:#888;
    font-style:italic;
}

.section{
    margin-bottom:25px;
}

.section h2{
    color:#ff66a3;
    border-bottom:2px dashed #ffd6e7;
    padding-bottom:5px;
    margin-bottom:10px;
}

ul{
    list-style:none;
    padding:0;
}

li{
    padding:6px 0;
    color:#444;
}

.tag{
    display:inline-block;
    background:#ffe6f0;
    padding:6px 14px;
    border-radius:20px;
    margin:5px;
    color:#d63384;
    font-size:14px;
}

footer{
    text-align:center;
    margin-top:30px;
    font-size:13px;
    color:#aaa;
}

</style>
</head>

<body>

<div class="cv">

<header>
<h1>Rivero</h1>
<p>Currículum Vitae</p>
</header>

<div class="section">
<h2>Estudios</h2>
<ul>
<li>Ninguno</li>
</ul>
</div>

<div class="section">
<h2>Intereses</h2>
<div class="tag">Comer</div>
<div class="tag">Dormir</div>
</div>

<div class="section">
<h2>Habilidades</h2>
<ul>
<li>Cero</li>
</ul>
</div>

<footer>
CV estilo coquette
</footer>

</div>

</body>
</html>
