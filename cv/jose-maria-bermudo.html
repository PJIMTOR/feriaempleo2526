<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV de José María</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=MedievalSharp&display=swap" rel="stylesheet">
  <style>
    /* Reset básico */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(to bottom, #1b1b2f, #2e2e4d);
      color: #f0f0f0;
      line-height: 1.6;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #1e1e2f;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.7);
      overflow: hidden;
    }

    header {
      background: #ff6f61;
      text-align: center;
      padding: 40px 20px;
      font-family: 'MedievalSharp', cursive;
      box-shadow: inset 0 -5px 10px rgba(0,0,0,0.3);
    }

    header h1 {
      font-size: 3rem;
      color: #fff;
      text-shadow: 2px 2px #000;
    }

    section {
      padding: 30px 40px;
      border-bottom: 1px solid #444;
    }

    section:last-child {
      border-bottom: none;
    }

    h2 {
      font-family: 'MedievalSharp', cursive;
      font-size: 2rem;
      color: #ffcc00;
      margin-bottom: 15px;
      text-shadow: 1px 1px #000;
    }

    ul {
      list-style: none;
      padding-left: 0;
    }

    li {
      background: #2e2e4d;
      margin-bottom: 10px;
      padding: 10px 15px;
      border-radius: 8px;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
      transition: transform 0.2s;
    }

    li:hover {
      transform: translateX(5px);
    }

    .interests span {
      background: #ff6f61;
      color: #fff;
      padding: 5px 12px;
      margin-right: 8px;
      border-radius: 20px;
      font-weight: bold;
      box-shadow: 1px 1px 3px rgba(0,0,0,0.5);
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #1e1e2f;
      color: #999;
      font-size: 0.9rem;
      letter-spacing: 1px;
    }

    /* Animación ligera de encabezado */
    header h1 {
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { text-shadow: 2px 2px #000; }
      50% { text-shadow: 2px 2px #ffcc00; }
      100% { text-shadow: 2px 2px #000; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>José María</h1>
    </header>

    <section>
      <h2>Estudios</h2>
      <ul>
        <li>Educación Secundaria Obligatoria (ESO)</li>
      </ul>
    </section>

    <section>
      <h2>Intereses</h2>
      <div class="interests">
        <span>Tecnología</span>
        <span>Videojuegos</span>
      </div>
    </section>

    <section>
      <h2>Habilidades</h2>
      <ul>
        <li>Trabajo en equipo</li>
        <li>Aprendizaje rápido</li>
      </ul>
    </section>

    <footer>
      CV diseñado al estilo Seven Deadly Sins ✨
    </footer>
  </div>
</body>
</html>
