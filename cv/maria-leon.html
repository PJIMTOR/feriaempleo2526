<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV - María León</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Bangers&family=Poppins:wght@300;400;600&display=swap');

body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background: linear-gradient(135deg,#f5f5f5,#e9e9e9);
}

/* Contenedor principal */
.cv{
    max-width:900px;
    margin:40px auto;
    background:white;
    border:6px solid black;
    box-shadow:10px 10px 0px #000;
}

/* Cabecera estilo manga */
.header{
    background:#111;
    color:white;
    padding:30px;
    text-align:center;
    position:relative;
}

.header h1{
    font-family:'Bangers',cursive;
    font-size:60px;
    margin:0;
    letter-spacing:3px;
}

.header span{
    background:white;
    color:black;
    padding:5px 15px;
    border:3px solid black;
    display:inline-block;
    margin-top:10px;
    transform:rotate(-2deg);
}

/* Secciones */
.section{
    padding:25px 35px;
    border-top:4px dashed black;
}

.section h2{
    font-family:'Bangers',cursive;
    font-size:32px;
    margin-bottom:15px;
    display:inline-block;
    background:#000;
    color:#fff;
    padding:5px 15px;
    transform:skew(-5deg);
}

/* Listas */
ul{
    list-style:none;
    padding:0;
}

li{
    padding:8px 0;
    font-size:16px;
    position:relative;
}

li::before{
    content:"★";
    margin-right:10px;
    color:#000;
}

/* Tarjetas tipo manga */
.card{
    background:#fafafa;
    border:3px solid black;
    padding:15px;
    margin-top:10px;
    box-shadow:5px 5px 0 #000;
}

/* Footer */
.footer{
    text-align:center;
    padding:15px;
    font-size:14px;
    background:#111;
    color:#fff;
}
</style>

</head>
<body>

<div class="cv">

<div class="header">
<h1>María León</h1>
<span>Currículum Vitae</span>
</div>

<div class="section">
<h2>Estudios</h2>
<div class="card">
<ul>
<li>Bachillerato</li>
</ul>
</div>
</div>

<div class="section">
<h2>Habilidades</h2>
<div class="card">
<ul>
<li>Trabajo en equipo</li>
<li>Aprendizaje rápido</li>
<li>Trabajo bajo presión</li>
</ul>
</div>
</div>

<div class="section">
<h2>Intereses</h2>
<div class="card">
<ul>
<li>Tecnología</li>
<li>Anime</li>
</ul>
</div>
</div>

<div class="footer">
CV creativo estilo manga
</div>

</div>

</body>
</html>
